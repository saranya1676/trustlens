# ==========================================
# TruthLens AI - Application Configuration
# ==========================================

spring.application.name=TruthLens AI

# ==========================================
# Server
# ==========================================
server.port=8080

# ==========================================
# MySQL Database
# Change username/password to match your MySQL setup
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/truthlens_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==========================================
# File Upload
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# Jackson JSON
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ==========================================
# Logging
# ==========================================
logging.level.com.truthlens=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
