<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- ================================================================
     NAVBAR FRAGMENT
     Usage: <div th:replace="~{fragments/navbar :: navbar}"></div>
     ================================================================ -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNavbar">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <div class="brand-icon">
                <i class="bi bi-shield-check"></i>
            </div>
            <div>
                <span class="brand-name">TruthLens</span>
                <span class="brand-tag">AI</span>
                <div class="brand-subtitle">News Verification</div>
            </div>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Home</a>
                </li>

                <!-- Categories Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="/news" id="newsDropdown"
                       role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-newspaper me-1"></i>News
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="newsDropdown">
                        <li><a class="dropdown-item" href="/news">
                            <i class="bi bi-grid me-2"></i>All Categories</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/news?category=INTERNATIONAL">
                            <i class="bi bi-globe me-2 text-info"></i>International</a></li>
                        <li><a class="dropdown-item" href="/news?category=NATIONAL">
                            <i class="bi bi-flag me-2 text-success"></i>National</a></li>
                        <li><a class="dropdown-item" href="/news?category=POLITICS">
                            <i class="bi bi-building me-2 text-warning"></i>Politics</a></li>
                        <li><a class="dropdown-item" href="/news?category=SPORTS">
                            <i class="bi bi-trophy me-2 text-danger"></i>Sports</a></li>
                        <li><a class="dropdown-item" href="/news?category=TECHNOLOGY">
                            <i class="bi bi-cpu me-2 text-primary"></i>Technology</a></li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a class="nav-link nav-verify" href="/verify">
                        <i class="bi bi-search me-1"></i>Verify News
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/about">
                        <i class="bi bi-info-circle me-1"></i>About
                    </a>
                </li>
            </ul>

            <!-- Search bar -->
            <form class="d-flex gap-2" id="navSearchForm" onsubmit="handleNavSearch(event)">
                <div class="input-group input-group-sm">
                    <input type="text" class="form-control nav-search-input"
                           id="navSearchInput" placeholder="Search news..."
                           aria-label="Search news">
                    <button class="btn btn-outline-light btn-sm" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
