<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse news by category on TruthLens AI.">
    <title>Browse News – TruthLens AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ================================================================
     PAGE HEADER
     ================================================================ -->
<section class="page-header-section">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb breadcrumb-dark">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item active">Browse News</li>
            </ol>
        </nav>
        <h1 class="page-header-title">Browse News</h1>
        <p class="page-header-subtitle">Explore the latest stories across all categories</p>
    </div>
</section>

<!-- ================================================================
     FILTER BAR
     ================================================================ -->
<section class="filter-bar-section sticky-filter">
    <div class="container">
        <div class="row align-items-center gy-2">
            <!-- Category tabs -->
            <div class="col-lg-7">
                <div class="category-tabs" id="categoryTabs" role="tablist">
                    <button class="cat-tab active" data-category="" onclick="filterByCategory('')">
                        <i class="bi bi-grid me-1"></i>All
                    </button>
                    <button class="cat-tab" data-category="INTERNATIONAL" onclick="filterByCategory('INTERNATIONAL')">
                        <i class="bi bi-globe me-1"></i>International
                    </button>
                    <button class="cat-tab" data-category="NATIONAL" onclick="filterByCategory('NATIONAL')">
                        <i class="bi bi-flag me-1"></i>National
                    </button>
                    <button class="cat-tab" data-category="POLITICS" onclick="filterByCategory('POLITICS')">
                        <i class="bi bi-building me-1"></i>Politics
                    </button>
                    <button class="cat-tab" data-category="SPORTS" onclick="filterByCategory('SPORTS')">
                        <i class="bi bi-trophy me-1"></i>Sports
                    </button>
                    <button class="cat-tab" data-category="TECHNOLOGY" onclick="filterByCategory('TECHNOLOGY')">
                        <i class="bi bi-cpu me-1"></i>Technology
                    </button>
                </div>
            </div>

            <!-- Search box -->
            <div class="col-lg-5">
                <div class="input-group">
                    <input type="text" class="form-control" id="browseSearchInput"
                           placeholder="Search articles..." aria-label="Search articles">
                    <button class="btn btn-primary" type="button" onclick="searchArticles()">
                        <i class="bi bi-search"></i>
                    </button>
                    <button class="btn btn-outline-secondary" type="button" id="clearSearchBtn"
                            onclick="clearSearch()" style="display:none">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ================================================================
     RESULTS AREA
     ================================================================ -->
<section class="browse-results-section py-4">
    <div class="container">
        <!-- Status bar -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div id="resultsStatus" class="text-muted small">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Loading articles...
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="text-muted small">Sort:</span>
                <select class="form-select form-select-sm" id="sortSelect" style="width:auto"
                        onchange="changeSortOrder()">
                    <option value="latest">Latest First</option>
                    <option value="popular">Most Popular</option>
                </select>
            </div>
        </div>

        <!-- Articles grid -->
        <div id="articlesGrid" class="row gy-4">
            <!-- Populated by JS -->
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-newspaper display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">No articles found</h4>
            <p class="text-muted">Try a different search term or category.</p>
            <button class="btn btn-primary mt-2" onclick="clearSearch()">
                <i class="bi bi-arrow-counterclockwise me-2"></i>Clear Filters
            </button>
        </div>

        <!-- Pagination -->
        <nav id="paginationContainer" class="mt-5 d-none" aria-label="Articles pagination">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>
</section>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<!-- Chatbot Widget -->
<div th:replace="~{fragments/chatbot :: chatbot}"></div>
<script>
    // State
    let currentCategory = '';
    let currentPage     = 0;
    let currentKeyword  = '';
    let totalPages      = 0;

    document.addEventListener('DOMContentLoaded', () => {
        // Read URL params
        const params = new URLSearchParams(window.location.search);
        const cat    = params.get('category') || '';
        const q      = params.get('q') || '';

        if (cat) setActiveCategory(cat);
        if (q)   document.getElementById('browseSearchInput').value = q;

        currentCategory = cat;
        currentKeyword  = q;
        loadArticles();

        // Enter key on search
        document.getElementById('browseSearchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') searchArticles();
        });
    });

    function filterByCategory(category) {
        currentCategory = category;
        currentPage     = 0;
        currentKeyword  = '';
        document.getElementById('browseSearchInput').value = '';
        document.getElementById('clearSearchBtn').style.display = 'none';
        setActiveCategory(category);
        updateUrlParams();
        loadArticles();
    }

    function setActiveCategory(category) {
        document.querySelectorAll('.cat-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.category === category);
        });
    }

    function searchArticles() {
        const q = document.getElementById('browseSearchInput').value.trim();
        currentKeyword = q;
        currentPage    = 0;
        document.getElementById('clearSearchBtn').style.display = q ? 'block' : 'none';
        updateUrlParams();
        loadArticles();
    }

    function clearSearch() {
        currentKeyword = '';
        currentPage    = 0;
        document.getElementById('browseSearchInput').value = '';
        document.getElementById('clearSearchBtn').style.display = 'none';
        updateUrlParams();
        loadArticles();
    }

    function changeSortOrder() {
        currentPage = 0;
        loadArticles();
    }

    function updateUrlParams() {
        const params = new URLSearchParams();
        if (currentCategory) params.set('category', currentCategory);
        if (currentKeyword)  params.set('q', currentKeyword);
        window.history.replaceState({}, '', '/news' + (params.toString() ? '?' + params : ''));
    }

    function loadArticles() {
        const grid = document.getElementById('articlesGrid');
        grid.innerHTML = `<div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div></div>`;
        document.getElementById('emptyState').classList.add('d-none');
        document.getElementById('paginationContainer').classList.add('d-none');

        let url;
        if (currentKeyword) {
            url = `/api/news/search?q=${encodeURIComponent(currentKeyword)}&page=${currentPage}&size=9`;
            if (currentCategory) url += `&category=${currentCategory}`;
        } else if (currentCategory) {
            url = `/api/news/category/${currentCategory}?page=${currentPage}&size=9`;
        } else {
            url = `/api/news/latest`;
        }

        fetch(url)
            .then(r => r.json())
            .then(data => {
                if (!data.success) throw new Error(data.message);

                // Handle both Page<> and List<> responses
                const articles = data.data.content || data.data;
                totalPages = data.data.totalPages || 1;
                const total  = data.data.totalElements !== undefined
                    ? data.data.totalElements : (articles ? articles.length : 0);

                document.getElementById('resultsStatus').innerHTML =
                    `<i class="bi bi-newspaper me-1"></i>
                    ${total.toLocaleString()} article${total !== 1 ? 's' : ''} found
                    ${currentKeyword ? `for "<strong>${currentKeyword}</strong>"` : ''}`;

                if (!articles || articles.length === 0) {
                    grid.innerHTML = '';
                    document.getElementById('emptyState').classList.remove('d-none');
                    return;
                }

                grid.innerHTML = articles.map(a => createArticleCard(a)).join('');
                renderPagination(currentPage, totalPages);
            })
            .catch(err => {
                grid.innerHTML = `<div class="col-12">
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        Failed to load articles: ${err.message}
                    </div></div>`;
            });
    }

    function goToPage(page) {
        currentPage = page;
        loadArticles();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
