<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ================================================================
     CHATBOT WIDGET FRAGMENT
     Usage: <div th:replace="~{fragments/chatbot :: chatbot}"></div>
     Include BEFORE </body> on every page, after Bootstrap JS.
     ================================================================ -->
<div th:fragment="chatbot">

  <!-- ── Toggle button ────────────────────────────────────────── -->
  <button class="chatbot-toggle" id="chatbotToggle"
          aria-label="Open AI Chat Assistant" title="Ask TruthLens AI">
    <i class="bi bi-chat-dots-fill" id="chatbotToggleIcon"></i>
  </button>

  <!-- ── Chat window ──────────────────────────────────────────── -->
  <div class="chatbot-window" id="chatbotWindow" role="dialog"
       aria-label="TruthLens AI Chat Assistant" aria-modal="true">

    <!-- Header -->
    <div class="chatbot-header">
      <div class="chatbot-avatar">
        <i class="bi bi-shield-check"></i>
      </div>
      <div class="chatbot-header-info">
        <p class="chatbot-title">TruthLens AI</p>
        <div class="chatbot-status">
          <span class="chatbot-status-dot"></span>
          <span class="chatbot-subtitle">News Assistant · Online</span>
        </div>
      </div>
      <button class="chatbot-close" id="chatbotClose"
              aria-label="Close chat" title="Close">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <!-- Messages -->
    <div class="chatbot-messages" id="chatbotMessages"
         aria-live="polite" aria-label="Chat messages">
      <!-- Messages are injected by chatbot.js -->
    </div>

    <!-- Input area -->
    <div class="chatbot-input-area">
      <div class="chatbot-input-row">
        <textarea
          class="chatbot-input"
          id="chatbotInput"
          placeholder="Ask about any news, article or topic..."
          rows="1"
          maxlength="500"
          aria-label="Chat message input"
        ></textarea>
        <button class="chatbot-send" id="chatbotSend"
                aria-label="Send message" title="Send" disabled>
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
      <p class="chatbot-hint">
        <i class="bi bi-info-circle me-1"></i>
        Analyses all news articles in real-time · Press Enter to send
      </p>
    </div>

  </div><!-- /chatbot-window -->

  <!-- Chatbot script (loaded last so DOM is ready) -->
  <script th:src="@{/js/chatbot.js}"></script>

</div>
</body>
</html>
